<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; background:#0a1f44; color:white; text-align:center; margin-top:100px; }
    input { display:block; width:80%; margin:10px auto; padding:12px; border-radius:8px; border:none; }
    button { width:85%; padding:12px; background:#1e90ff; color:white; border:none; border-radius:8px; }
  </style>
</head>
<body>

<h2>Wallet Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<p>Don’t have account? <a href="signup.html" style="color:lightblue;">Sign up</a></p>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let users = JSON.parse(localStorage.getItem("users")) || {};

  if(users[u] && users[u].password === p){
    localStorage.setItem("currentUser", u);
    window.location = "dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
