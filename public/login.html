<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      background: #0a1f44;
      color: white;
      text-align: center;
      margin-top: 100px;
    }

    input {
      display: block;
      width: 80%;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 15px;
      width: 85%;
      background: #1e90ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Secure Bank Login</h1>

  <input id="username" type="text" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <script>
    function login() {
      const username = document.getElementById("username").value;

      // save user name (optional)
      localStorage.setItem("user", username);

      // ALWAYS go to dashboard (no invalid login)
      window.location.href = "dashboard.html";
    }
  </script>

</body>
</html>
