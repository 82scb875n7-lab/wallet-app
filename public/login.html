<!DOCTYPE html>
<html>
<head>
  <title>Bank Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1b2a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1b263b;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }

    button:hover {
      background: #415a77;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Secure Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem("username", data.username);
      localStorage.setItem("balance", data.balance);
      window.location.href = "dashboard.html";
    } else {
      alert("Invalid login");
    }
  });
}
</script>

</body>
</html>
