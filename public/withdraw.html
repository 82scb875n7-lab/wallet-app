<!DOCTYPE html>
<html>
<head>
  <title>Withdraw</title>
</head>
<body>

  <h1>Withdraw Money</h1>

  <input type="number" id="amount" placeholder="Enter amount" />
  <br><br>

  <button onclick="withdraw()">Withdraw</button>

  <p id="message"></p>

  <script>
    function withdraw() {
      let amount = document.getElementById("amount").value;

      if (amount === "") {
        document.getElementById("message").innerText = "Please enter amount";
      } else {
        document.getElementById("message").innerText =
          "Withdrawal pending... Please complete system payment before withdrawal can be completed.";
      }
    }
  </script>

</body>
</html>
