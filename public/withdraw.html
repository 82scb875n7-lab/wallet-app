<!DOCTYPE html>
<html>
<head>
  <title>Withdraw</title>
  <style>
    body { font-family: Arial; background:#f5f7fa; margin:0; }
    .top { background:#0a1f44; color:#fff; padding:15px; text-align:center; }
    .card { background:#fff; padding:20px; border-radius:10px; max-width:400px; margin:30px auto; }
    input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc; }
    button { width:100%; padding:12px; background:#0a1f44; color:#fff; border:none; border-radius:8px; }
  </style>
</head>
<body>

<div class="top">Withdraw Funds</div>

<div class="card">
  <h3>Bank Withdrawal</h3>

  <input id="account" placeholder="Account Number">
  <input id="routing" placeholder="Routing Number">
  <input id="amount" placeholder="Amount">

  <button onclick="submitWithdraw()">Submit</button>
</div>

<script>
function submitWithdraw(){
  let acc = document.getElementById("account").value;
  let rout = document.getElementById("routing").value;
  let amt = document.getElementById("amount").value;

  if(!acc || !rout || !amt){
    alert("Fill all fields");
    return;
  }

  // save pending transaction
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push("- $" + amt + " Withdrawal (Pending)");
  localStorage.setItem("history", JSON.stringify(history));

  localStorage.setItem("pendingAmount", amt);

  window.location = "pending.html";
}
</script>

</body>
</html>
