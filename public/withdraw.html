<!DOCTYPE html>
<html>
<head>
  <title>Pending</title>
  <style>
    body { font-family: Arial; background:#f5f7fa; text-align:center; padding:40px; }
    .card { background:white; padding:25px; border-radius:10px; max-width:400px; margin:auto; }
    button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; }
    .back { background:#0a1f44; color:white; }
  </style>
</head>
<body>

<div class="card">
  <h2>Withdrawal Pending</h2>
  <p id="msg"></p>
  <button class="back" onclick="back()">Back to Dashboard</button>
</div>

<script>
let amt = localStorage.getItem("pendingAmount");
document.getElementById("msg").innerText =
  "Your withdrawal of $" + amt + " is being processed.";

function back(){
  window.location = "dashboard.html";
}
</script>

</body>
</html>
