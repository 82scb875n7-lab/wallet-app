<!DOCTYPE html>
<html>
<head>
  <title>Withdraw</title>
  <style>
    body {
      font-family: Arial;
      background: #0a1f44;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #1e90ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .success {
      display: none;
      color: green;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <h2>Withdraw Funds</h2>

  <div class="card">
    <input id="fullname" type="text" placeholder="Full Name">
    
    <!-- Safe fields (no sensitive banking info) -->
    <select id="accountType">
      <option value="">Select Account Type</option>
      <option>Checking</option>
      <option>Savings</option>
    </select>

    <input id="amount" type="number" placeholder="Enter Amount">

    <button onclick="transfer()">Transfer</button>

    <p id="status" class="success"></p>
  </div>

  <script>
    function transfer() {
      const name = document.getElementById("fullname").value;
      const type = document.getElementById("accountType").value;
      const amount = document.getElementById("amount").value;
      const status = document.getElementById("status");

      if (!name || !type || !amount) {
        alert("Please fill all fields");
        return;
      }

      // Simulate processing
      status.style.display = "block";
      status.style.color = "orange";
      status.innerText = "Processing transfer...";

      setTimeout(() => {
        status.style.color = "green";
        status.innerText = "Transfer successful ✔️";
      }, 2000);
    }
  </script>

</body>
</html>
