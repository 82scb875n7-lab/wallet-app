<script>
let username = localStorage.getItem("username");

function loadUser() {
  fetch('/user/' + username)
    .then(res => res.json())
    .then(user => {
      document.getElementById("user").innerText = user.username;
      document.getElementById("balance").innerText = user.balance;

      let html = "";
      user.history.forEach(h => html += "<p>" + h + "</p>");
      document.getElementById("history").innerHTML = html;
    });
}

loadUser();

/* ACTIONS */

function addMoney() {
  fetch('/add-money', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username })
  }).then(() => {
    alert("Payment method added");
    loadUser();
  });
}

function transfer() {
  let amount = document.getElementById("amt").value;

  fetch('/transfer', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, amount })
  }).then(() => {
    alert("Transfer request sent");
    loadUser();
  });
}

function buyBTC() {
  fetch('/buy-btc', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username })
  }).then(() => {
    alert("Bitcoin request submitted");
    loadUser();
  });
}

function withdraw() {
  fetch('/withdraw', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    loadUser();
  });
}
</script>
