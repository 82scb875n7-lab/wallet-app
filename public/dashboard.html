<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; background:#f5f7fa; margin:0; }
    .top { background:#0a1f44; color:white; padding:15px; }
    .card { background:white; margin:20px; padding:20px; border-radius:10px; }
    button { width:100%; padding:12px; margin-top:10px; background:#0a1f44; color:white; border:none; border-radius:8px; }
  </style>
</head>
<body>

<div class="top">
  Welcome, <span id="name"></span>
</div>

<div class="card">
  <h2>Balance: $<span id="bal"></span></h2>
  <button onclick="goWithdraw()">Withdraw</button>
</div>

<div class="card">
  <h3>Transaction History</h3>
  <div id="history"></div>
</div>

<script>
let currentUser = localStorage.getItem("currentUser");
let users = JSON.parse(localStorage.getItem("users"));

document.getElementById("name").innerText = currentUser;

let userData = users[currentUser];

document.getElementById("bal").innerText = userData.balance;

let box = document.getElementById("history");
userData.history.forEach(t => {
  let p = document.createElement("p");
  p.innerText = t;
  box.appendChild(p);
});

function goWithdraw(){
  window.location = "withdraw.html";
}
</script>

</body>
</html>
