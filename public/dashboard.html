<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
    }

    .top {
      background: #0a1f44;
      color: white;
      padding: 15px;
    }

    .card {
      background: white;
      margin: 20px;
      padding: 15px;
      border-radius: 8px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      background: #0a1f44;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="top">
    Welcome, <span id="name">User</span>
  </div>

  <div class="card">
    <h2>Balance: $10,000</h2>

    <button onclick="alert('Add payment method first')">Add Money</button>
    <button onclick="alert('Enter account number')">Transfer</button>
    <button onclick="alert('Paste BTC wallet')">Buy Bitcoin</button>

    <!-- ✅ WORKING WITHDRAW BUTTON -->
    <button onclick="window.location='withdraw.html'">Withdraw</button>
  </div>

  <div class="card">
    <h3>Transaction History</h3>
    <p>+ $500 Deposit</p>
    <p>- $200 Transfer</p>
  </div>

  <script>
    document.getElementById("name").innerText = "User";
  </script>

</body>
</html>
