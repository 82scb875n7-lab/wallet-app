<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f8;
    }

    .header {
      background: #1b263b;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .balance {
      font-size: 28px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #1b263b;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #415a77;
    }
  </style>
</head>
<body>

<div class="header">
  <h2>My Bank</h2>
</div>

<div class="container">

  <div class="card">
    <p>Welcome, <span id="user"></span></p>
    <p class="balance">$<span id="balance"></span></p>
  </div>

  <div class="card">
    <button onclick="withdraw()">Withdraw $100</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
let username = localStorage.getItem("username");
let balance = localStorage.getItem("balance");

document.getElementById("user").innerText = username;
document.getElementById("balance").innerText = balance;

function withdraw() {
  fetch('/withdraw', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: username,
      amount: 100
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);

    if (data.success) {
      localStorage.setItem("balance", data.balance);
      document.getElementById("balance").innerText = data.balance;
    }
  });
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
