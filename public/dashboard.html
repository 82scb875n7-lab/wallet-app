<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
    }

    .top {
      background: #0a1f44;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    .card {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .balance {
      font-size: 24px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0a1f44;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .history p {
      margin: 5px 0;
      color: #333;
    }
  </style>
</head>

<body>

<div class="top">
  Welcome, <span id="name">User</span>
</div>

<div class="card">
  <div class="balance">Balance: $10,000</div>

  <!-- ONLY WITHDRAW BUTTON -->
  <button onclick="window.location='withdraw.html'">Withdraw Funds</button>
</div>

<div class="card history">
  <h3>Transaction History</h3>
  <div id="history"></div>
</div>

<script>
const user = localStorage.getItem("user");
document.getElementById("name").innerText = user || "User";

// Load history
let history = JSON.parse(localStorage.getItem("history")) || [];
let box = document.getElementById("history");

history.forEach(t => {
  let p = document.createElement("p");
  p.innerText = t;
  box.appendChild(p);
});
</script>

</body>
</html>
