<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body { font-family: Arial; background:#f5f7fa; margin:0; }
    .top { background:#0a1f44; color:#fff; padding:15px; }
    .card { background:#fff; margin:20px; padding:20px; border-radius:10px; }
    button { width:100%; padding:12px; margin-top:10px; background:#0a1f44; color:#fff; border:none; border-radius:8px; }
  </style>
</head>
<body>

<div class="top">
  Welcome, <span id="name">User</span>
</div>

<div class="card">
  <h2>Balance: $<span id="bal">0</span></h2>
  <button onclick="window.location='withdraw.html'">Withdraw Funds</button>
</div>

<div class="card">
  <h3>Transaction History</h3>
  <div id="history"></div>
</div>

<script>
const user = localStorage.getItem("user") || "User";
document.getElementById("name").innerText = user;

// balance
let balance = parseInt(localStorage.getItem("balance")) || 10000;
document.getElementById("bal").innerText = balance;

// history
let history = JSON.parse(localStorage.getItem("history")) || [];
let box = document.getElementById("history");

history.forEach(t => {
  let p = document.createElement("p");
  p.innerText = t;
  box.appendChild(p);
});
</script>

</body>
</html>
